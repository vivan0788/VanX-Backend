<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VanX | Stealth Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; padding: 0; background: #0a0b10; color: #00ff88; 
            font-family: 'Roboto', sans-serif; overflow-x: hidden;
        }
        header {
            background: rgba(16, 18, 27, 0.9); padding: 20px;
            border-bottom: 2px solid #00ff88; text-align: center;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }
        h1 { font-family: 'Orbitron', sans-serif; margin: 0; letter-spacing: 3px; font-size: 1.5rem; }
        
        .container { padding: 20px; }
        
        .stats-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 15px; margin-bottom: 20px; 
        }
        .stat-card {
            background: #161a25; border: 1px solid #2d3343; padding: 20px;
            border-radius: 12px; transition: 0.3s;
        }
        .stat-card:hover { border-color: #00ff88; transform: translateY(-5px); }
        .stat-card h3 { margin: 0; color: #8892b0; font-size: 0.8rem; text-transform: uppercase; }
        .stat-card p { margin: 10px 0 0; font-size: 1.8rem; font-weight: bold; font-family: 'Orbitron'; }

        #map { 
            height: 450px; width: 100%; border-radius: 15px; 
            border: 1px solid #2d3343; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        /* Modern Leaflet Design */
        .leaflet-container { background: #0a0b10 !important; }
        .leaflet-popup-content-wrapper { background: #161a25; color: #00ff88; border: 1px solid #00ff88; }
        .leaflet-popup-tip { background: #00ff88; }
    </style>
</head>
<body>

<header>
    <h1>VANX STEALTH SYSTEM v2.0</h1>
</header>

<div class="container">
    <div class="stats-grid">
        <div class="stat-card">
            <h3>Active Nodes</h3>
            <p id="count">0</p>
        </div>
        <div class="stat-card" style="border-left: 4px solid #00ff88;">
            <h3>System Status</h3>
            <p style="color: #00ff88; font-size: 1.2rem;">ENCRYPTED</p>
        </div>
        <div class="stat-card">
            <h3>Network Health</h3>
            <p style="color: #4cc9f0; font-size: 1.2rem;">STABLE</p>
        </div>
    </div>

    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map').setView([26.7606, 83.8914], 6);
    
    // Dark Mode Map Tiles
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    function loadData() {
        fetch('/get_data')
            .then(res => res.json())
            .then(data => {
                document.getElementById('count').innerText = data.length;
                data.forEach(loc => {
                    var marker = L.circleMarker([loc.latitude, loc.longitude], {
                        color: '#00ff88',
                        radius: 8,
                        fillOpacity: 0.8
                    }).addTo(map);
                    
                    marker.bindPopup(`
                        <div style="font-family: 'Orbitron'">
                            <b style="color: #4cc9f0">TARGET INFO</b><br>
                            🔋 Battery: ${loc.battery}<br>
                            📡 Type: ${loc.type}<br>
                            ⏰ ${loc.timestamp}
                        </div>
                    `);
                });
            });
    }

    loadData();
    // Auto Refresh every 30 seconds
    setInterval(loadData, 30000);
</script>

</body>
</html>
