<!DOCTYPE html>
<html>
<head>
    <title>VanX Admin Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 500px; width: 100%; border-radius: 10px; }
        body { font-family: Arial; padding: 20px; background: #f0f2f5; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); flex: 1; }
    </style>
</head>
<body>
    <h2>🚀 VanX Global Tracking Map</h2>
    <div class="stats">
        <div class="card"><h3>Total Logs</h3><p id="count">Loading...</p></div>
        <div class="card"><h3>Last Active</h3><p id="time">-</p></div>
    </div>
    <div id="map"></div>

    <script>
        var map = L.map('map').setView([26.7606, 83.8914], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Backend se data lene ke liye (Iska route hum app.py mein banayenge)
        fetch('/get_data')
            .then(res => res.json())
            .then(data => {
                document.getElementById('count').innerText = data.length;
                data.forEach(loc => {
                    L.marker([loc.latitude, loc.longitude])
                     .addTo(map)
                     .bindPopup(`<b>Battery: ${loc.battery}</b><br>Time: ${loc.timestamp}`);
                });
            });
    </script>
</body>
</html>
